<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Rainbow Prism | 나의 마음을 비추는 컬러</title>
<meta name="robots" content="noindex, nofollow">
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#fd0100">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Rainbow Prism">
<link rel="apple-touch-icon" href="./icon-192.png">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR',-apple-system,BlinkMacSystemFont,sans-serif;background:#f8f0f0;overflow-x:hidden}
.main-wrap{max-width:500px;margin:0 auto;padding:28px 20px}
.header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.logo{font-size:26px;font-weight:900;color:#1a1a2e;letter-spacing:1px}
.sub{font-size:11px;color:#aaa;letter-spacing:2px;margin-top:4px}
.round-badge{background:#1a1a2e;color:#fff;padding:6px 18px;border-radius:20px;font-size:13px;font-weight:700;
  text-align:center;margin:0 auto 16px}
.reset-btn{padding:8px 18px;border-radius:20px;border:1.5px solid #ddd;background:#fff;
  font-size:12px;color:#888;font-weight:600;cursor:pointer;font-family:inherit}
.card-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.color-card{
  padding:22px 10px;border-radius:16px;text-align:center;cursor:pointer;
  transition:transform 0.15s,box-shadow 0.15s;position:relative;overflow:hidden;
}
.color-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,0.13)}
.color-card:active{transform:scale(0.96)}
.color-card .en{font-size:20px;font-weight:900;color:#fff;letter-spacing:2px;
  text-shadow:0 2px 8px rgba(0,0,0,0.15);margin-bottom:8px}
.color-card .remain{
  display:inline-block;font-size:11px;font-weight:700;color:#fff;
  background:rgba(255,255,255,0.25);padding:4px 12px;border-radius:12px;
}
.color-card .remain.done{background:rgba(0,0,0,0.2)}

/* 모달 */
.overlay{display:none;position:fixed;inset:0;z-index:1000;
  background:rgba(0,0,0,0.55);justify-content:center;align-items:center;
  opacity:0;transition:opacity 0.3s}
.overlay.show{display:flex;opacity:1}
.overlay.hiding{opacity:0}
.modal-card{
  width:360px;height:620px;position:relative;perspective:1200px;
  transform:scale(0.85);transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
}
.overlay.show .modal-card{transform:scale(1)}
.overlay.hiding .modal-card{transform:scale(0.85)}

.card-inner{
  width:100%;height:100%;position:relative;
  -webkit-transform-style:preserve-3d;transform-style:preserve-3d;
  transition:transform 0.6s cubic-bezier(0.4,0,0.2,1);
}
.card-inner.no-anim{transition:none}
.card-inner.flipped{transform:rotateY(180deg)}
.card-face{
  position:absolute;width:100%;height:100%;
  -webkit-backface-visibility:hidden;backface-visibility:hidden;
  border-radius:28px;overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,0.25);
}

/* 뒷면 */
.card-back{display:flex;flex-direction:column;justify-content:center;align-items:center}
.card-back .deco{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-55%);
  width:220px;height:220px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,rgba(255,255,255,0.28) 0%,rgba(255,255,255,0.12) 35%,rgba(255,255,255,0.02) 100%);
  box-shadow:inset 0 12px 32px rgba(0,0,0,0.25),inset -8px -8px 20px rgba(0,0,0,0.1),0 0 80px rgba(255,255,255,0.15);
  filter:blur(0.8px);
}
.card-back .top-bar{position:absolute;top:0;left:0;right:0;font-size:12px;font-weight:700;
  letter-spacing:2px;background:#fff;padding:12px 0;text-align:center;font-style:italic}
.card-back .name-en{font-size:56px;font-weight:900;color:#fff;letter-spacing:5px;
  text-shadow:0 4px 12px rgba(0,0,0,0.15);z-index:1}
.card-back .name-kr{font-size:20px;font-weight:700;color:rgba(255,255,255,0.6);margin-top:6px;letter-spacing:4px;z-index:1}
.card-back .bot{position:absolute;bottom:16px;text-align:center}
.dots{display:flex;gap:3px;justify-content:center;margin-bottom:8px}
.dots span{width:5px;height:5px;border-radius:50%}
.brand{font-size:12px;font-weight:700;color:rgba(255,255,255,0.7);letter-spacing:2px;margin-bottom:3px}
.brand-sub{font-size:10px;color:rgba(255,255,255,0.4);letter-spacing:1px;margin-bottom:8px}
.cp{font-size:6px;color:rgba(255,255,255,0.2);line-height:1.4}

/* 앞면 */
.card-front{transform:rotateY(180deg);display:flex;flex-direction:column;background:#fff}
.card-front .hdr{padding:14px 20px;display:flex;align-items:center;justify-content:center;gap:12px}
.card-front .hdr .tag{font-size:28px;font-weight:900;color:#fff;letter-spacing:3px;
  text-shadow:0 2px 6px rgba(0,0,0,0.15)}
.card-front .hdr .bdg{padding:5px 16px;border-radius:16px;background:rgba(255,255,255,0.9);
  font-size:12px;font-weight:800}
.card-front .body{flex:1;display:flex;flex-direction:column;justify-content:center;
  align-items:center;padding:20px 24px;text-align:center}
.card-front .qmark{font-size:32px;font-weight:900;color:#ddd;margin-bottom:6px}
.card-front .qt{font-size:23px;font-weight:600;color:#333;line-height:1.7;word-break:keep-all}
.card-front .qt .kw{font-weight:900;padding:2px 8px;border-radius:6px}
.card-front .qt .vs-text{font-weight:900;font-size:24px;line-height:2.2}
.card-front .sep{width:60px;height:2px;margin:16px auto 0;opacity:0.2}
.card-front .foot{padding:16px 20px 48px;text-align:center}
.card-front .foot .pr{font-size:10px;font-weight:700;letter-spacing:2px;color:#bbb;margin-bottom:8px}
.card-front .foot .kwb{display:inline-block;padding:4px 16px;border-radius:14px;
  font-size:12px;font-weight:900;margin-bottom:10px}
.card-front .foot .ht{font-size:16px;font-weight:800;line-height:1.9}
.card-front .foot .cpf{font-size:6px;color:#ccc;margin-top:12px;line-height:1.4}

@media(max-width:400px){
  .modal-card{width:320px;height:540px}
  .card-back .name-en{font-size:48px}
  .card-front .qt{font-size:21px}
  .card-front .foot .ht{font-size:15px}
}
@media(min-width:600px){
  .main-wrap{max-width:560px;padding:40px 30px}
  .card-grid{gap:18px}
  .color-card{padding:28px 14px;border-radius:20px}
  .color-card .en{font-size:24px}
  .color-card .remain{font-size:12px;padding:5px 14px}
  .modal-card{width:420px;height:700px}
  .card-back .name-en{font-size:64px}
  .card-front .qt{font-size:26px}
  .card-front .foot .ht{font-size:18px}
}
@media(min-width:900px){
  .main-wrap{max-width:640px;padding:48px 36px}
  .card-grid{gap:22px}
  .color-card{padding:32px 16px;border-radius:22px}
  .color-card .en{font-size:26px}
  .modal-card{width:460px;height:740px}
}
</style>
</head>

var COLORS=["RED","ORANGE","YELLOW","GREEN","CYAN","NAVY","PURPLE","MAGENTA","PINK"];
var CC={
  RED:{hex:"#fd0100",dark:"#c40100",text:"#fd0100",kr:"레드"},
  ORANGE:{hex:"#ff9900",dark:"#d98200",text:"#ff9900",kr:"오렌지"},
  YELLOW:{hex:"#ffde59",dark:"#e0c340",text:"#c4a800",kr:"옐로우"},
  GREEN:{hex:"#00b050",dark:"#009040",text:"#00b050",kr:"그린"},
  CYAN:{hex:"#38b6ff",dark:"#2a9ad9",text:"#38b6ff",kr:"시안"},
  NAVY:{hex:"#0b0b92",dark:"#080870",text:"#0b0b92",kr:"네이비"},
  PURPLE:{hex:"#631da2",dark:"#4e1580",text:"#631da2",kr:"퍼플"},
  MAGENTA:{hex:"#ff009d",dark:"#d90085",text:"#ff009d",kr:"마젠타"},
  PINK:{hex:"#ffc0d5",dark:"#e0a8bb",text:"#e0608a",kr:"핑크"}
};
var decks={},round=1;

function init(){
  COLORS.forEach(function(c){
    decks[c]=[];
    for(var i=0;i<Q[c].length;i++) decks[c].push(i);
  });
  try{var s=localStorage.getItem("rp15");if(s){var d=JSON.parse(s);decks=d.decks;round=d.round;}}catch(e){}
  render();
}
function save(){
  try{localStorage.setItem("rp15",JSON.stringify({decks:decks,round:round}));}catch(e){}
}
function render(){
  var grid=document.getElementById("grid");
  grid.innerHTML="";
  var total=Q[COLORS[0]].length;
  var used=total-decks[COLORS[0]].length;
  document.getElementById("roundBadge").textContent=(used+1)+" / "+total+" 회차";
  
  COLORS.forEach(function(c){
    var cc=CC[c];
    var remain=decks[c].length;
    var d=document.createElement("div");
    d.className="color-card";
    d.style.background="linear-gradient(135deg,"+cc.hex+","+cc.dark+")";
    d.innerHTML='<div class="en">'+c+'</div><div class="remain'+(remain===0?" done":"")+'">남은 카드: '+remain+'</div>';
    d.onclick=function(){draw(c);};
    grid.appendChild(d);
  });
}
function draw(c){
  if(decks[c].length===0){alert("이 컬러 카드가 모두 소진되었습니다!");return;}
  var ri=Math.floor(Math.random()*decks[c].length);
  var qi=decks[c].splice(ri,1)[0];
  var d=Q[c][qi];
  var cc=CC[c];
  
  // 뒷면
  document.getElementById("cardBack").style.background="linear-gradient(135deg,"+cc.hex+","+cc.dark+")";
  document.getElementById("backEn").textContent=c;
  document.getElementById("backKr").textContent=cc.kr;
  var dots=document.getElementById("dots");
  dots.innerHTML="";
  COLORS.forEach(function(cl){
    var s=document.createElement("span");
    s.style.background=CC[cl].hex;
    dots.appendChild(s);
  });
  
  // 앞면
  document.getElementById("frontHdr").style.background="linear-gradient(135deg,"+cc.hex+","+cc.dark+")";
  document.getElementById("frontTag").textContent=c;
  document.getElementById("frontBdg").textContent=d.c+" · Q"+("0"+d.n).slice(-2);
  document.getElementById("frontBdg").style.color=cc.text;
  
  // VS 질문 vs 일반 질문
  var qEl=document.getElementById("frontQ");
  if(d.vs){
    qEl.innerHTML='<span class="vs-text" style="color:'+cc.text+'">'+d.k.replace(' VS ','<br><span style="font-size:16px;color:#999;letter-spacing:3px">VS</span><br>')+'</span>';
  }else{
    qEl.innerHTML=d.q+'<span class="kw" style="color:'+cc.text+';background:'+cc.hex+'22">'+d.k+'</span>'+d.a;
  }
  
  document.getElementById("frontSep").style.background=cc.hex;
  document.getElementById("frontKwb").textContent=d.vs?"VS 선택":"키워드 : "+d.k;
  document.getElementById("frontKwb").style.background=cc.hex+"15";
  document.getElementById("frontKwb").style.color=cc.text;
  
  var tags=d.h.split(/\s+/);
  var htEl=document.getElementById("frontHt");
  htEl.style.color=cc.text;
  if(tags.length>3){
    htEl.innerHTML=tags.slice(0,Math.ceil(tags.length/2)).join("  ")+"<br>"+tags.slice(Math.ceil(tags.length/2)).join("  ");
  }else{
    htEl.textContent=tags.join("  ");
  }
  
  // 플립 애니메이션
  var inner=document.getElementById("cardInner");
  inner.classList.add("no-anim");
  inner.classList.remove("flipped");
  document.getElementById("overlay").classList.remove("hiding");
  document.getElementById("overlay").classList.add("show");
  
  setTimeout(function(){
    inner.classList.remove("no-anim");
    inner.classList.add("flipped");
  },400);
  
  save();
  render();
}
function closeCard(){
  var ov=document.getElementById("overlay");
  ov.classList.add("hiding");
  setTimeout(function(){ov.classList.remove("show","hiding");},300);
}
document.getElementById("overlay").onclick=function(e){if(e.target===this)closeCard();};

function resetAll(){
  if(!confirm("진행 상황을 초기화할까요?"))return;
  COLORS.forEach(function(c){
    decks[c]=[];
    for(var i=0;i<Q[c].length;i++) decks[c].push(i);
  });
  round=1;save();render();
}
init();
</script>

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(function(){});
}
